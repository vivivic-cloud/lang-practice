<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자연스러운 언어 학습</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3349;
      --accent: #5b6ef5;
      --accent-hover: #7080ff;
      --text: #e8eaf6;
      --text-muted: #7b82a8;
      --success: #4caf8a;
      --radius: 14px;
      --lv1: #4caf8a;
      --lv2: #f5a623;
      --lv3: #e05c5c;
      --lv4: #b06ef5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }
    header { text-align: center; margin-bottom: 48px; }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { margin-top: 8px; color: var(--text-muted); font-size: 0.95rem; }

    /* STEP INDICATOR */
    .steps { display: flex; align-items: center; gap: 0; margin-bottom: 40px; }
    .step { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-muted); }
    .step.active { color: var(--accent); }
    .step.done { color: var(--success); }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; flex-shrink: 0;
    }
    .step.done .step-num { background: var(--success); border-color: var(--success); color: #fff; }
    .step.active .step-num { background: var(--accent); border-color: var(--accent); color: #fff; }
    .step-line { width: 40px; height: 2px; background: var(--border); margin: 0 4px; }
    .step-line.done { background: var(--success); }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 700px;
    }
    .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 24px; }

    /* LANGUAGE GRID */
    .lang-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    @media (max-width: 520px) { .lang-grid { grid-template-columns: repeat(3, 1fr); } }
    .lang-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 8px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      transition: all 0.2s; color: var(--text);
    }
    .lang-btn:hover { border-color: var(--accent); background: #1f2340; }
    .lang-btn.selected { border-color: var(--accent); background: rgba(91,110,245,0.15); }
    .lang-btn .flag { font-size: 2rem; }
    .lang-btn .name { font-size: 0.8rem; font-weight: 600; }
    .lang-btn .native { font-size: 0.7rem; color: var(--text-muted); }

    /* LEVEL SELECTOR */
    .level-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    @media (max-width: 480px) { .level-grid { grid-template-columns: repeat(2, 1fr); } }
    .level-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 8px 16px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      transition: all 0.2s; color: var(--text);
      position: relative; overflow: hidden;
    }
    .level-btn:hover { transform: translateY(-2px); }
    .level-btn.lv1 { --lv-color: var(--lv1); }
    .level-btn.lv2 { --lv-color: var(--lv2); }
    .level-btn.lv3 { --lv-color: var(--lv3); }
    .level-btn.lv4 { --lv-color: var(--lv4); }
    .level-btn.selected { border-color: var(--lv-color); background: color-mix(in srgb, var(--lv-color) 15%, transparent); }
    .level-btn:hover { border-color: var(--lv-color); }
    .level-icon { font-size: 1.8rem; }
    .level-name { font-size: 1rem; font-weight: 700; color: var(--lv-color); }
    .level-label { font-size: 0.72rem; color: var(--text-muted); }
    .level-desc { font-size: 0.72rem; color: var(--text-muted); text-align: center; line-height: 1.4; margin-top: 4px; }
    .level-bar {
      width: 100%; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .level-bar-fill { height: 100%; background: var(--lv-color); border-radius: 2px; transition: width 0.4s; }

    /* SENTENCES */
    .sentence-controls {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .badge {
      border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; font-weight: 600;
    }
    .badge-cat { background: rgba(91,110,245,0.2); color: var(--accent); }
    .badge-lv1 { background: rgba(76,175,138,0.2); color: var(--lv1); }
    .badge-lv2 { background: rgba(245,166,35,0.2); color: var(--lv2); }
    .badge-lv3 { background: rgba(224,92,92,0.2); color: var(--lv3); }
    .badge-lv4 { background: rgba(176,110,245,0.2); color: var(--lv4); }

    .btn-refresh {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 8px; padding: 6px 14px;
      cursor: pointer; font-size: 0.82rem; display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
    .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }

    .sentence-list { display: flex; flex-direction: column; gap: 10px; }
    .sentence-item {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 16px 18px; cursor: pointer;
      display: flex; align-items: center; gap: 14px;
      transition: all 0.18s; user-select: none; position: relative;
    }
    .sentence-item:hover { border-color: var(--accent); }
    .sentence-item.selected { border-color: var(--accent); background: rgba(91,110,245,0.12); }
    .sentence-item .lv-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .sentence-item .lv-dot.lv1 { background: var(--lv1); }
    .sentence-item .lv-dot.lv2 { background: var(--lv2); }
    .sentence-item .lv-dot.lv3 { background: var(--lv3); }
    .sentence-item .lv-dot.lv4 { background: var(--lv4); }
    .checkbox {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all 0.18s;
    }
    .sentence-item.selected .checkbox { background: var(--accent); border-color: var(--accent); }
    .checkbox-mark { color: #fff; font-size: 0.75rem; display: none; }
    .sentence-item.selected .checkbox-mark { display: block; }
    .sentence-text { font-size: 1rem; line-height: 1.5; flex: 1; }
    .sentence-tag {
      font-size: 0.72rem; color: var(--text-muted);
      background: var(--border); border-radius: 4px; padding: 2px 7px; flex-shrink: 0;
    }

    /* CAT TABS */
    .cat-tab {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px; font-size: 0.82rem;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s;
    }
    .cat-tab:hover { border-color: var(--accent); color: var(--text); }
    .cat-tab.active {
      background: rgba(91,110,245,0.2); border-color: var(--accent);
      color: var(--accent); font-weight: 600;
    }

    /* SELECTED PREVIEW */
    .selected-preview { margin-top: 20px; display: none; }
    .selected-preview.visible { display: block; }
    .preview-title { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 10px; }
    .preview-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .preview-chip {
      background: rgba(91,110,245,0.15); border: 1px solid rgba(91,110,245,0.3);
      border-radius: 20px; padding: 5px 12px; font-size: 0.82rem;
      display: flex; align-items: center; gap: 6px;
    }
    .chip-remove { cursor: pointer; color: var(--text-muted); font-size: 0.9rem; }
    .chip-remove:hover { color: #ff6b6b; }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(15,17,23,0.95); border-top: 1px solid var(--border);
      backdrop-filter: blur(10px); padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .selected-count { font-size: 0.9rem; color: var(--text-muted); }
    .selected-count span { color: var(--accent); font-weight: 700; }
    .btn-next {
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; padding: 12px 28px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
    }
    .btn-next:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-next:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; }

    /* LEVEL CHANGE CHIP */
    .current-info {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px;
    }
    .info-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px; font-size: 0.8rem; color: var(--text-muted);
      cursor: pointer; transition: all 0.2s;
    }
    .info-chip:hover { border-color: var(--accent); color: var(--text); }
    .info-chip .dot { width: 8px; height: 8px; border-radius: 50%; }

    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .hidden { display: none !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>🌏 LangPick</h1>
  <p>자연스러운 일상 문장으로 언어를 배우세요</p>
</header>

<!-- STEP INDICATOR -->
<div class="steps">
  <div class="step active" id="step1-indicator">
    <div class="step-num">1</div><span>모국어 선택</span>
  </div>
  <div class="step-line" id="line1"></div>
  <div class="step" id="step2-indicator">
    <div class="step-num">2</div><span>레벨 선택</span>
  </div>
  <div class="step-line" id="line2"></div>
  <div class="step" id="step3-indicator">
    <div class="step-num">3</div><span>문장 선택</span>
  </div>
  <div class="step-line" id="line3"></div>
  <div class="step" id="step4-indicator">
    <div class="step-num">4</div><span>학습하기</span>
  </div>
</div>

<!-- STEP 1: 모국어 선택 -->
<div class="card fade-in" id="step1">
  <div class="card-title">모국어를 선택하세요</div>
  <div class="lang-grid">
    <button class="lang-btn" data-lang="kor" onclick="selectNativeLang(this)">
      <span class="flag">🇰🇷</span><span class="name">Korean</span><span class="native">한국어</span>
    </button>
    <button class="lang-btn" data-lang="eng" onclick="selectNativeLang(this)">
      <span class="flag">🇺🇸</span><span class="name">English</span><span class="native">영어</span>
    </button>
    <button class="lang-btn" data-lang="jpn" onclick="selectNativeLang(this)">
      <span class="flag">🇯🇵</span><span class="name">Japanese</span><span class="native">日本語</span>
    </button>
    <button class="lang-btn" data-lang="cmn" onclick="selectNativeLang(this)">
      <span class="flag">🇨🇳</span><span class="name">Chinese</span><span class="native">中文</span>
    </button>
    <button class="lang-btn" data-lang="vie" onclick="selectNativeLang(this)">
      <span class="flag">🇻🇳</span><span class="name">Vietnamese</span><span class="native">Tiếng Việt</span>
    </button>
  </div>
</div>

<!-- STEP 2: 레벨 선택 -->
<div class="card fade-in hidden" id="step2">
  <div class="card-title">학습 레벨을 선택하세요</div>
  <div class="level-grid">
    <button class="level-btn lv1" data-level="1" onclick="selectLevel(this)">
      <span class="level-icon">🌱</span>
      <span class="level-name">초급</span>
      <span class="level-label">Beginner</span>
      <span class="level-desc">짧고 단순한<br>기본 표현</span>
      <div class="level-bar"><div class="level-bar-fill" style="width:25%"></div></div>
    </button>
    <button class="level-btn lv2" data-level="2" onclick="selectLevel(this)">
      <span class="level-icon">📗</span>
      <span class="level-name">중급</span>
      <span class="level-label">Intermediate</span>
      <span class="level-desc">일상에서 자주<br>쓰는 표현</span>
      <div class="level-bar"><div class="level-bar-fill" style="width:50%"></div></div>
    </button>
    <button class="level-btn lv3" data-level="3" onclick="selectLevel(this)">
      <span class="level-icon">🔥</span>
      <span class="level-name">고급</span>
      <span class="level-label">Advanced</span>
      <span class="level-desc">뉘앙스 있는<br>자연스러운 표현</span>
      <div class="level-bar"><div class="level-bar-fill" style="width:75%"></div></div>
    </button>
    <button class="level-btn lv4" data-level="4" onclick="selectLevel(this)">
      <span class="level-icon">👑</span>
      <span class="level-name">급</span>
      <span class="level-label">Master</span>
      <span class="level-desc">원어민 수준<br>관용·속어 표현</span>
      <div class="level-bar"><div class="level-bar-fill" style="width:100%"></div></div>
    </button>
  </div>
</div>

<!-- STEP 3: 문장 선택 -->
<div class="card fade-in hidden" id="step3">
  <div class="sentence-controls">
    <div>
      <div class="card-title" style="margin-bottom:4px" id="step3-title">문장을 선택하세요</div>
      <div style="font-size:0.82rem; color:var(--text-muted)">여러 개 선택 가능 · 일상에서 자주 쓰는 표현들입니다</div>
    </div>
    <div style="display:flex; gap:8px; align-items:center">
      <span class="badge badge-cat" id="category-badge">일상</span>
      <button class="btn-refresh" id="refresh-btn" onclick="refreshSentences()">
        <span id="refresh-icon">↻</span> 새로고침
      </button>
    </div>
  </div>

  <!-- Current info chips -->
  <div class="current-info">
    <div class="info-chip" onclick="goToStep(1)">
      <span id="info-lang-flag">🇰🇷</span>
      <span id="info-lang-name">한국어</span>
      <span style="font-size:0.7rem">✕</span>
    </div>
    <div class="info-chip" id="info-level-chip" onclick="goToStep(2)">
      <span class="dot" id="info-level-dot" style="background:var(--lv1)"></span>
      <span id="info-level-name">초급</span>
      <span style="font-size:0.7rem">✕</span>
    </div>
  </div>

  <!-- Category Tabs -->
  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px" id="category-tabs">
    <button class="cat-tab active" data-cat="daily" onclick="switchCategory(this,'daily')">일상 대화</button>
    <button class="cat-tab" data-cat="greeting" onclick="switchCategory(this,'greeting')">인사/반응</button>
    <button class="cat-tab" data-cat="feeling" onclick="switchCategory(this,'feeling')">감정/상태</button>
    <button class="cat-tab" data-cat="question" onclick="switchCategory(this,'question')">질문</button>
  </div>

  <div class="sentence-list" id="sentence-list"></div>

  <div class="selected-preview" id="selected-preview">
    <div class="preview-title">선택한 문장 (<span id="preview-count">0</span>개)</div>
    <div class="preview-chips" id="preview-chips"></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar hidden" id="bottom-bar">
  <div class="selected-count"><span id="count-display">0</span>개 선택됨</div>
  <button class="btn-next" id="next-btn" disabled onclick="goNext()">학습 시작 →</button>
</div>

<script>
// ── DATA: level 1=초급 2=중급 3=고급 4=급 ─────────────────────
const SENTENCES = {
  kor: {
    daily: [
      // 초급

      { text: "얼마 만이야, 진짜 오랜만이다.", tag: "인사", lv: 3 },
      { text: "그동안 잘 지냈어? 연락이 없길래.", tag: "인사", lv: 3 },
      { text: "아 그렇구나, 몰랐네.", tag: "반응", lv: 3 },

// ── STATE ─────────────────────────────────────────────
let nativeLang = null;
let currentLevel = null;
let currentCategory = 'daily';
let selectedSentences = new Set();

const LANG_INFO = {
  kor: { flag: '🇰🇷', name: '한국어' },
  eng: { flag: '🇺🇸', name: 'English' },
  jpn: { flag: '🇯🇵', name: '日本語' },
  cmn: { flag: '🇨🇳', name: '中文' },
  vie: { flag: '🇻🇳', name: 'Tiếng Việt' },
};
const LEVEL_INFO = {
  1: { name: '초급', color: 'var(--lv1)', cls: 'lv1' },
  2: { name: '중급', color: 'var(--lv2)', cls: 'lv2' },
  3: { name: '고급', color: 'var(--lv3)', cls: 'lv3' },
  4: { name: '급',   color: 'var(--lv4)', cls: 'lv4' },
};

// ── STEP NAV ──────────────────────────────────────────
function setStepDone(n) {
  const el = document.getElementById(`step${n}-indicator`);
  el.classList.remove('active');
  el.classList.add('done');
  el.querySelector('.step-num').textContent = '✓';
  const line = document.getElementById(`line${n}`);
  if (line) line.classList.add('done');
}
function setStepActive(n) {
  document.getElementById(`step${n}-indicator`).classList.add('active');
}

function goToStep(n) {
  // Reset from step n onward
  [1,2,3].forEach(i => {
    if (i >= n) {
      document.getElementById(`step${i}`).classList.add('hidden');
    }
  });
  document.getElementById('bottom-bar').classList.add('hidden');

  if (n === 1) {
    document.getElementById('step1').classList.remove('hidden');
    ['step1-indicator','step2-indicator','step3-indicator','step4-indicator'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('active','done');
      el.querySelector('.step-num').textContent = id.replace('step','').replace('-indicator','');
    });
    ['line1','line2','line3'].forEach(id => document.getElementById(id).classList.remove('done'));
    document.getElementById('step1-indicator').classList.add('active');
  } else if (n === 2) {
    document.getElementById('step2').classList.remove('hidden');
    document.getElementById('step2-indicator').classList.remove('done');
    document.getElementById('step2-indicator').classList.add('active');
    document.getElementById('step2-indicator').querySelector('.step-num').textContent = '2';
    ['step3-indicator','step4-indicator'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('active','done');
      el.querySelector('.step-num').textContent = id.includes('3') ? '3' : '4';
    });
    document.getElementById('line2').classList.remove('done');
    document.getElementById('line3').classList.remove('done');
  }
}

// ── STEP 1: 언어 선택 ─────────────────────────────────
function selectNativeLang(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  nativeLang = btn.dataset.lang;

  setTimeout(() => {
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    setStepDone(1);
    setStepActive(2);
  }, 200);
}

// ── STEP 2: 레벨 선택 ────────────────────────────────
function selectLevel(btn) {
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  currentLevel = parseInt(btn.dataset.level);

  // update info chips
  const li = LEVEL_INFO[currentLevel];
  const lang = LANG_INFO[nativeLang];
  document.getElementById('info-lang-flag').textContent = lang.flag;
  document.getElementById('info-lang-name').textContent = lang.name;
  document.getElementById('info-level-name').textContent = li.name;
  document.getElementById('info-level-dot').style.background = li.color;

  setTimeout(() => {
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step3').classList.remove('hidden');
    document.getElementById('bottom-bar').classList.remove('hidden');
    setStepDone(2);
    setStepActive(3);

    // reset category
    currentCategory = 'daily';
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-cat="daily"]').classList.add('active');
    selectedSentences.clear();
    updateBottomBar();
    updatePreview();
    renderSentences();
  }, 200);
}

// ── STEP 3: 문장 ──────────────────────────────────────
function switchCategory(btn, cat) {
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = cat;
  const catNames = { daily: '일상', greeting: '인사/반응', feeling: '감정', question: '질문' };
  document.getElementById('category-badge').textContent = catNames[cat];
  renderSentences();
}

function renderSentences() {
  const list = document.getElementById('sentence-list');
  const all = SENTENCES[nativeLang][currentCategory];
  const filtered = all.filter(s => s.lv === currentLevel);
  const shuffled = [...filtered].sort(() => Math.random() - 0.5);

  list.innerHTML = '';
  if (shuffled.length === 0) {
    list.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:32px">이 카테고리에 해당 레벨 문장이 없습니다.</div>`;
    return;
  }

  const li = LEVEL_INFO[currentLevel];
  shuffled.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'sentence-item fade-in' + (selectedSentences.has(s.text) ? ' selected' : '');
    item.style.animationDelay = `${i * 0.04}s`;
    item.dataset.text = s.text;
    item.innerHTML = `
      <div class="checkbox"><span class="checkbox-mark">✓</span></div>
      <span class="lv-dot ${li.cls}"></span>
      <div class="sentence-text">${s.text}</div>
      <span class="sentence-tag">${s.tag}</span>
    `;
    item.addEventListener('click', () => toggleSentence(item, s.text));
    list.appendChild(item);
  });
}

function toggleSentence(item, text) {
  if (selectedSentences.has(text)) {
    selectedSentences.delete(text);
    item.classList.remove('selected');
  } else {
    selectedSentences.add(text);
    item.classList.add('selected');
  }
  updateBottomBar();
  updatePreview();
}

function refreshSentences() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  setTimeout(() => { renderSentences(); btn.disabled = false; }, 350);
}

function updateBottomBar() {
  const count = selectedSentences.size;
  document.getElementById('count-display').textContent = count;
  document.getElementById('next-btn').disabled = count === 0;
}

function updatePreview() {
  const preview = document.getElementById('selected-preview');
  const chips = document.getElementById('preview-chips');
  document.getElementById('preview-count').textContent = selectedSentences.size;
  if (selectedSentences.size === 0) { preview.classList.remove('visible'); return; }
  preview.classList.add('visible');
  chips.innerHTML = '';
  selectedSentences.forEach(text => {
    const chip = document.createElement('div');
    chip.className = 'preview-chip';
    const safe = text.replace(/'/g, "\\'");
    chip.innerHTML = `<span>${text}</span><span class="chip-remove" onclick="removeSelected('${safe}')">×</span>`;
    chips.appendChild(chip);
  });
}

function removeSelected(text) {
  selectedSentences.delete(text);
  document.querySelectorAll('.sentence-item').forEach(item => {
    if (item.dataset.text === text) item.classList.remove('selected');
  });
  updateBottomBar();
  updatePreview();
}

function goNext() {
  const lv = LEVEL_INFO[currentLevel];
  alert(`✅ ${selectedSentences.size}개 문장 선택 완료!\n레벨: ${lv.name}\n\n다음 단계: 학습 언어를 선택하고 연습을 시작합니다.\n(개발 예정)`);
}
</script>
