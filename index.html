<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>LangPick</title>
  <style>
    :root{
      --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3349;
      --accent:#5b6ef5;--accent-hover:#7080ff;--text:#e8eaf6;--text-muted:#7b82a8;
      --success:#4caf8a;--warn:#f5a623;--radius:14px;
      --lv1:#4caf8a;--lv2:#f5a623;--lv3:#e05c5c;--lv4:#b06ef5;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR','Noto Sans JP','Noto Sans SC',sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;
      display:flex;flex-direction:column;align-items:center;padding:30px 12px 90px;
    }
    header{text-align:center;margin-bottom:32px;}
    header h1{font-size:1.8rem;font-weight:700;}
    header p{margin-top:6px;color:var(--text-muted);font-size:0.9rem;}

    /* STEPS */
    .steps{display:flex;align-items:center;margin-bottom:28px;flex-wrap:wrap;justify-content:center;gap:3px;}
    .step{display:flex;align-items:center;gap:5px;font-size:0.75rem;color:var(--text-muted);}
    .step.active{color:var(--accent);}
    .step.done{color:var(--success);}
    .step-num{width:24px;height:24px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;flex-shrink:0;}
    .step.done .step-num{background:var(--success);border-color:var(--success);color:#fff;}
    .step.active .step-num{background:var(--accent);border-color:var(--accent);color:#fff;}
    .step-line{width:22px;height:2px;background:var(--border);}
    .step-line.done{background:var(--success);}

    /* CARD */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:700px;}
    .card-title{font-size:1.05rem;font-weight:600;margin-bottom:5px;}
    .card-sub{font-size:0.8rem;color:var(--text-muted);margin-bottom:18px;}

    /* LANG GRID */
    .lang-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;}
    @media(max-width:520px){.lang-grid{grid-template-columns:repeat(3,1fr);}}
    .lang-btn{
      background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius);
      padding:14px 5px;cursor:pointer;display:flex;flex-direction:column;
      align-items:center;gap:6px;transition:all 0.2s;color:var(--text);position:relative;
    }
    .lang-btn:hover:not(:disabled){border-color:var(--accent);transform:translateY(-2px);}
    .lang-btn.selected{border-color:var(--accent);background:rgba(91,110,245,0.18);}
    .lang-btn.selected::after{content:'✓';position:absolute;top:5px;right:7px;font-size:0.7rem;color:var(--accent);font-weight:700;}
    .lang-btn:disabled{opacity:0.3;cursor:not-allowed;}
    .lang-btn .flag{font-size:1.7rem;}
    .lang-btn .name{font-size:0.75rem;font-weight:600;}
    .lang-btn .native{font-size:0.65rem;color:var(--text-muted);}

    /* SELECTED LANGS CHIPS */
    .selected-langs{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;min-height:28px;}
    .lang-chip{display:flex;align-items:center;gap:5px;background:rgba(91,110,245,0.15);border:1px solid rgba(91,110,245,0.4);border-radius:20px;padding:4px 10px;font-size:0.8rem;}

    /* LEVEL GRID */
    .level-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;}
    @media(max-width:480px){.level-grid{grid-template-columns:repeat(2,1fr);}}
    .level-btn{
      background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius);
      padding:16px 6px 12px;cursor:pointer;display:flex;flex-direction:column;
      align-items:center;gap:6px;transition:all 0.2s;color:var(--text);
    }
    .level-btn.lv1{--lv-c:var(--lv1);} .level-btn.lv2{--lv-c:var(--lv2);}
    .level-btn.lv3{--lv-c:var(--lv3);} .level-btn.lv4{--lv-c:var(--lv4);}
    .level-btn:hover{border-color:var(--lv-c);transform:translateY(-2px);}
    .level-btn.selected{border-color:var(--lv-c);background:rgba(91,110,245,0.08);}
    .level-icon{font-size:1.6rem;}
    .level-name{font-size:0.95rem;font-weight:700;color:var(--lv-c);}
    .level-label{font-size:0.68rem;color:var(--text-muted);}
    .level-desc{font-size:0.68rem;color:var(--text-muted);text-align:center;line-height:1.4;}
    .level-bar{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
    .level-bar-fill{height:100%;background:var(--lv-c);border-radius:2px;}

    /* SENTENCE LIST */
    .sentence-controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:7px;}
    .badge{border-radius:20px;padding:2px 9px;font-size:0.75rem;font-weight:600;}
    .badge-cat{background:rgba(91,110,245,0.2);color:var(--accent);}
    .btn-sm{background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:4px 11px;cursor:pointer;font-size:0.78rem;display:flex;align-items:center;gap:4px;transition:all 0.2s;}
    .btn-sm:hover{border-color:var(--accent);color:var(--accent);}
    .btn-sm:disabled{opacity:0.4;cursor:not-allowed;}
    .cat-tab{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:0.78rem;color:var(--text-muted);cursor:pointer;transition:all 0.2s;}
    .cat-tab:hover{border-color:var(--accent);color:var(--text);}
    .cat-tab.active{background:rgba(91,110,245,0.2);border-color:var(--accent);color:var(--accent);font-weight:600;}

    .sentence-list{display:flex;flex-direction:column;gap:8px;}
    .sentence-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;transition:all 0.18s;user-select:none;}
    .sentence-item:hover{border-color:var(--accent);}
    .sentence-item.selected{border-color:var(--accent);background:rgba(91,110,245,0.1);}
    .lv-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .lv-dot.lv1{background:var(--lv1);} .lv-dot.lv2{background:var(--lv2);}
    .lv-dot.lv3{background:var(--lv3);} .lv-dot.lv4{background:var(--lv4);}
    .checkbox{width:19px;height:19px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.18s;}
    .sentence-item.selected .checkbox{background:var(--accent);border-color:var(--accent);}
    .checkbox-mark{color:#fff;font-size:0.72rem;display:none;}
    .sentence-item.selected .checkbox-mark{display:block;}
    .sentence-text{font-size:0.95rem;line-height:1.5;flex:1;}
    .sentence-tag{font-size:0.68rem;color:var(--text-muted);background:var(--border);border-radius:4px;padding:2px 5px;flex-shrink:0;}

    /* SELECTED PREVIEW */
    .selected-preview{margin-top:16px;display:none;}
    .selected-preview.visible{display:block;}
    .preview-title{font-size:0.78rem;color:var(--text-muted);margin-bottom:7px;}
    .preview-chips{display:flex;flex-wrap:wrap;gap:5px;}
    .preview-chip{background:rgba(91,110,245,0.12);border:1px solid rgba(91,110,245,0.3);border-radius:20px;padding:3px 9px;font-size:0.75rem;display:flex;align-items:center;gap:4px;}
    .chip-remove{cursor:pointer;color:var(--text-muted);}
    .chip-remove:hover{color:#ff6b6b;}

    /* INFO CHIPS */
    .current-info{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
    .info-chip{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:0.75rem;color:var(--text-muted);cursor:pointer;transition:all 0.2s;}
    .info-chip:hover{border-color:var(--accent);color:var(--text);}
    .info-chip .dot{width:7px;height:7px;border-radius:50%;}

    /* HINT BOX */
    .hint-box{display:flex;align-items:flex-start;gap:8px;background:rgba(91,110,245,0.07);border:1px solid rgba(91,110,245,0.2);border-radius:10px;padding:10px 13px;margin-bottom:16px;font-size:0.8rem;color:var(--text-muted);}

    /* BOTTOM BAR */
    .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,23,0.97);border-top:1px solid var(--border);backdrop-filter:blur(10px);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;z-index:100;}
    .selected-count{font-size:0.85rem;color:var(--text-muted);}
    .selected-count span{color:var(--accent);font-weight:700;}
    .btn-next{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
    .btn-next:hover{background:var(--accent-hover);transform:translateY(-1px);}
    .btn-next:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed;transform:none;}

    /* ══════════ STEP 5 : CAROUSEL ══════════ */
    #step5{padding:0;overflow:visible;}

    .carousel-header{
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
      padding:12px 16px;background:var(--surface);
      border:1px solid var(--border);border-bottom:none;
      border-radius:var(--radius) var(--radius) 0 0;
    }
    .lang-arrow{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:0.82rem;flex-wrap:wrap;}
    .lang-arrow .arr{color:var(--accent);}
    .card-counter-badge{font-size:0.82rem;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-weight:600;}

    .carousel-wrap{overflow:hidden;border-left:1px solid var(--border);border-right:1px solid var(--border);transition:height 0.3s ease;}
    .carousel-track{display:flex;transition:transform 0.38s cubic-bezier(0.25,0.46,0.45,0.94);will-change:transform;}

    /* LEARNING CARD */
    .lc-card{flex-shrink:0;width:100%;display:flex;flex-direction:column;}

    .lc-native{padding:22px 18px 16px;border-bottom:1px solid var(--border);}
    .lc-tag-row{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
    .lc-tag{font-size:0.7rem;color:var(--text-muted);background:var(--border);border-radius:4px;padding:2px 6px;}
    .lc-lv-dot{width:7px;height:7px;border-radius:50%;}
    .lc-native-text{font-size:1.45rem;font-weight:700;line-height:1.55;letter-spacing:-0.01em;}
    .lc-native-lang{margin-top:6px;font-size:0.75rem;color:var(--text-muted);display:flex;align-items:center;gap:5px;}

    /* TARGET ROWS */
    .lc-targets{display:flex;flex-direction:column;}
    .lc-target{
      padding:14px 18px;border-top:1px solid var(--border);
      cursor:pointer;transition:background 0.15s;user-select:none;
      -webkit-tap-highlight-color:transparent;position:relative;
    }
    .lc-target:active{background:rgba(91,110,245,0.07);}
    .lc-target.playing{background:rgba(76,175,138,0.06);}

    .lc-target-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
    .lc-target-label{display:flex;align-items:center;gap:6px;font-size:0.73rem;color:var(--text-muted);font-weight:600;}
    .speak-icon{font-size:0.9rem;opacity:0;}
    .lc-target.playing .speak-icon{opacity:1;animation:pulse 0.8s ease infinite alternate;}
    @keyframes pulse{from{opacity:0.5;}to{opacity:1;}}
    .tap-hint{font-size:0.62rem;color:var(--text-muted);opacity:0.6;}

    .lc-target-text{font-size:1.1rem;color:var(--accent);line-height:1.6;}
    .lc-target.playing .lc-target-text{color:var(--success);}

    /* Pinyin */
    .lc-pinyin{font-size:0.75rem;color:var(--text-muted);margin-bottom:2px;letter-spacing:0.04em;font-style:italic;}

    /* Furigana */
    ruby rt{font-size:0.52em;color:var(--text-muted);}

    /* CAROUSEL FOOTER */
    .carousel-footer{
      background:var(--surface);border:1px solid var(--border);border-top:none;
      border-radius:0 0 var(--radius) var(--radius);
      padding:13px 18px;display:flex;align-items:center;justify-content:space-between;
    }
    .carousel-dots{display:flex;gap:6px;align-items:center;}
    .cdot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all 0.25s;cursor:pointer;}
    .cdot.active{background:var(--accent);width:20px;border-radius:4px;}
    .carousel-nav{display:flex;gap:8px;}
    .btn-nav{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:50%;color:var(--text);cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
    .btn-nav:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
    .btn-nav:disabled{opacity:0.28;cursor:not-allowed;}

    /* ══════════ BREAKDOWN MODAL ══════════ */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:500;display:flex;align-items:flex-end;backdrop-filter:blur(3px);}
    .modal-overlay.hidden{display:none;}
    .modal-sheet{background:var(--surface);width:100%;max-width:700px;margin:0 auto;border-radius:20px 20px 0 0;max-height:80vh;overflow-y:auto;animation:slideUp 0.28s ease;}
    @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
    .modal-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
    .modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 18px 14px;border-bottom:1px solid var(--border);}
    .modal-header-left{display:flex;flex-direction:column;gap:4px;}
    .modal-lang-line{display:flex;align-items:center;gap:8px;}
    .modal-flag{font-size:1.3rem;}
    .modal-lang-name{font-size:0.9rem;font-weight:700;}
    .modal-original{font-size:1.05rem;color:var(--accent);}
    .modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;cursor:pointer;color:var(--text-muted);font-size:1rem;display:flex;align-items:center;justify-content:center;}
    .modal-close:hover{border-color:var(--accent);color:var(--text);}

    .modal-words{padding:14px 18px 20px;display:flex;flex-direction:column;gap:7px;}
    .word-row{display:grid;grid-template-columns:auto 1fr;gap:8px 14px;align-items:center;padding:9px 13px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);}
    .word-left{display:flex;flex-direction:column;gap:2px;min-width:70px;}
    .word-text{font-size:1.05rem;font-weight:700;color:var(--accent);}
    .word-reading{font-size:0.72rem;color:var(--text-muted);}
    .word-meaning{font-size:0.88rem;color:var(--text);line-height:1.5;}

    .modal-tip{margin:0 18px 18px;padding:9px 13px;background:rgba(91,110,245,0.07);border:1px solid rgba(91,110,245,0.2);border-radius:10px;font-size:0.78rem;color:var(--text-muted);line-height:1.5;}

    /* MISC */
    .fade-in{animation:fadeIn 0.3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
    .hidden{display:none!important;}
  </style>
</head>
<body>

<header>
  <h1>🌏 LangPick</h1>
  <p>자연스러운 일상 문장으로 언어를 배우세요</p>
</header>

<!-- STEPS -->
<div class="steps">
  <div class="step active" id="si1"><div class="step-num">1</div><span>모국어</span></div>
  <div class="step-line" id="sl1"></div>
  <div class="step" id="si2"><div class="step-num">2</div><span>레벨</span></div>
  <div class="step-line" id="sl2"></div>
  <div class="step" id="si3"><div class="step-num">3</div><span>문장 선택</span></div>
  <div class="step-line" id="sl3"></div>
  <div class="step" id="si4"><div class="step-num">4</div><span>학습 언어</span></div>
  <div class="step-line" id="sl4"></div>
  <div class="step" id="si5"><div class="step-num">5</div><span>학습</span></div>
</div>

<!-- STEP 1 -->
<div class="card fade-in" id="step1">
  <div class="card-title">모국어를 선택하세요</div>
  <div class="lang-grid" id="native-grid">
    <button class="lang-btn" data-lang="kor" onclick="selectNativeLang(this)"><span class="flag">🇰🇷</span><span class="name">Korean</span><span class="native">한국어</span></button>
    <button class="lang-btn" data-lang="eng" onclick="selectNativeLang(this)"><span class="flag">🇺🇸</span><span class="name">English</span><span class="native">영어</span></button>
    <button class="lang-btn" data-lang="jpn" onclick="selectNativeLang(this)"><span class="flag">🇯🇵</span><span class="name">Japanese</span><span class="native">日本語</span></button>
    <button class="lang-btn" data-lang="cmn" onclick="selectNativeLang(this)"><span class="flag">🇨🇳</span><span class="name">Chinese</span><span class="native">中文</span></button>
    <button class="lang-btn" data-lang="vie" onclick="selectNativeLang(this)"><span class="flag">🇻🇳</span><span class="name">Vietnamese</span><span class="native">Tiếng Việt</span></button>
  </div>
</div>

<!-- STEP 2 -->
<div class="card fade-in hidden" id="step2">
  <div class="card-title">학습 레벨을 선택하세요</div>
  <div class="level-grid">
    <button class="level-btn lv1" data-level="1" onclick="selectLevel(this)">
      <span class="level-icon">🌱</span><span class="level-name">초급</span>
      <span class="level-label">Beginner</span><span class="level-desc">짧고 단순한<br>기본 표현</span>
      <div class="level-bar"><div class="level-bar-fill" style="width:25%"></div></div>
    </button>
    <button class="level-btn lv2" data-level="2" onclick="selectLevel(this)">
      <span class="level-icon">📗</span><span class="level-name">중급</span>
      <span class="level-label">Intermediate</span><span class="level-desc">일상에서 자주<br>쓰는 표현</span>
      <div class="level-bar"><div class="level-bar-fill" style="width:50%"></div></div>
    </button>
    <button class="level-btn lv3" data-level="3" onclick="selectLevel(this)">
      <span class="level-icon">🔥</span><span class="level-name">고급</span>
      <span class="level-label">Advanced</span><span class="level-desc">뉘앙스 있는<br>자연스러운 표현</span>
      <div class="level-bar"><div class="level-bar-fill" style="width:75%"></div></div>
    </button>
    <button class="level-btn lv4" data-level="4" onclick="selectLevel(this)">
      <span class="level-icon">👑</span><span class="level-name">급</span>
      <span class="level-label">Master</span><span class="level-desc">원어민 수준<br>관용·속어 표현</span>
      <div class="level-bar"><div class="level-bar-fill" style="width:100%"></div></div>
    </button>
  </div>
</div>

<!-- STEP 3 -->
<div class="card fade-in hidden" id="step3">
  <div class="sentence-controls">
    <div>
      <div class="card-title" style="margin-bottom:3px">문장을 선택하세요</div>
      <div style="font-size:0.78rem;color:var(--text-muted)">여러 개 선택 가능 · 일상에서 실제로 쓰는 표현</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <span class="badge badge-cat" id="category-badge">일상</span>
      <button class="btn-sm" id="refresh-btn" onclick="refreshSentences()">↻ 새로고침</button>
    </div>
  </div>
  <div class="current-info">
    <div class="info-chip" onclick="goToStep(1)"><span id="i-lang-flag">🇰🇷</span><span id="i-lang-name">한국어</span><span style="font-size:0.6rem">✕</span></div>
    <div class="info-chip" onclick="goToStep(2)"><span class="dot" id="i-lv-dot" style="background:var(--lv1)"></span><span id="i-lv-name">초급</span><span style="font-size:0.6rem">✕</span></div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
    <button class="cat-tab active" data-cat="daily" onclick="switchCategory(this,'daily')">일상 대화</button>
    <button class="cat-tab" data-cat="greeting" onclick="switchCategory(this,'greeting')">인사/반응</button>
    <button class="cat-tab" data-cat="feeling" onclick="switchCategory(this,'feeling')">감정/상태</button>
    <button class="cat-tab" data-cat="question" onclick="switchCategory(this,'question')">질문</button>
  </div>
  <div class="sentence-list" id="sentence-list"></div>
  <div class="selected-preview" id="selected-preview">
    <div class="preview-title">선택한 문장 (<span id="preview-count">0</span>개)</div>
    <div class="preview-chips" id="preview-chips"></div>
  </div>
</div>

<!-- STEP 4 -->

let nativeLang=null, targetLangs=new Set(), currentLevel=null;
let currentCategory='daily', selectedIds=new Set(), currentStep=3;
let cardIndex=0, cardTotal=0;
let tapTimer=null, tapEl=null;

const LV_INFO={
 1:{name:'초급',color:'var(--lv1)',cls:'lv1'},
 2:{name:'중급',color:'var(--lv2)',cls:'lv2'},

 4:{name:'급',  color:'var(--lv4)',cls:'lv4'},
};

// ══════════════════════════════════════════════════════════
// STEP HELPERS
// ══════════════════════════════════════════════════════════
function stepDone(n){
 const el=document.getElementById('si'+n);
 el.classList.remove('active');el.classList.add('done');
 el.querySelector('.step-num').textContent='✓';
 const sl=document.getElementById('sl'+n);
 if(sl)sl.classList.add('done');
}
function stepActive(n){document.getElementById('si'+n).classList.add('active');}

function goToStep(n){
 [1,2,3,4,5].forEach(i=>{if(i>=n)document.getElementById('step'+i).classList.add('hidden');});
 document.getElementById('bottom-bar').classList.add('hidden');
 if(n<=3){selectedIds.clear();updateBottomBar();updatePreview();}
 if(n<=4){targetLangs.clear();renderTargetChips();}
 for(let i=n;i<=5;i++){
  const el=document.getElementById('si'+i);
  el.classList.remove('active','done');
  el.querySelector('.step-num').textContent=i;
  const sl=document.getElementById('sl'+i);
  if(sl)sl.classList.remove('done');
 }
 document.getElementById('step'+n).classList.remove('hidden');
 stepActive(n);
}

// STEP 1
// ══════════════════════════════════════════════════════════
function selectNativeLang(btn){
 document.querySelectorAll('#native-grid .lang-btn').forEach(b=>b.classList.remove('selected'));
 btn.classList.add('selected');
 nativeLang=btn.dataset.lang;
 setTimeout(()=>{
  stepDone(1);
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
  stepActive(2);
 },200);
}

// STEP 2
// ══════════════════════════════════════════════════════════
function selectLevel(btn){
 document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('selected'));
 btn.classList.add('selected');
 currentLevel=parseInt(btn.dataset.level);
 const li=LV_INFO[currentLevel],lang=LANG_INFO[nativeLang];
 document.getElementById('i-lang-flag').textContent=lang.flag;
 document.getElementById('i-lang-name').textContent=lang.name;
 document.getElementById('i-lv-name').textContent=li.name;
 document.getElementById('i-lv-dot').style.background=li.color;
 setTimeout(()=>{
  stepDone(2);
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step3').classList.remove('hidden');
  stepActive(3);currentStep=3;
  document.getElementById('bottom-bar').classList.remove('hidden');
  document.getElementById('bar-count-area').innerHTML='<span id="count-display">0</span>개 선택됨';
  document.getElementById('next-btn').textContent='다음 단계 →';
  currentCategory='daily';
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('[data-cat="daily"]').classList.add('active');
  renderSentences();
 },200);
}

// ══════════════════════════════════════════════════════════
// STEP 3
// ══════════════════════════════════════════════════════════
function switchCategory(btn,cat){
 document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');currentCategory=cat;
 const names={daily:'일상',greeting:'인사/반응',feeling:'감정',question:'질문'};
 document.getElementById('category-badge').textContent=names[cat];
 renderSentences();
}

function renderSentences(){
 const list=document.getElementById('sentence-list');
 const all=DATA[currentCategory].filter(s=>s.lv===currentLevel);
 const shuffled=[...all].sort(()=>Math.random()-0.5);
 list.innerHTML='';
 if(!shuffled.length){
  list.innerHTML='<div style="text-align:center;color:var(--text-muted);padding:28px">이 카테고리에 해당 레벨 문장이 없습니다.</div>';
  return;
 }
 const li=LV_INFO[currentLevel];
 shuffled.forEach((s,i)=>{
  const key=currentCategory+'-'+DATA[currentCategory].indexOf(s);
  const item=document.createElement('div');
  item.className='sentence-item fade-in'+(selectedIds.has(key)?' selected':'');
  item.style.animationDelay=`${i*0.04}s`;
  item.dataset.key=key;
  item.innerHTML=`<div class="checkbox"><span class="checkbox-mark">✓</span></div>
   <span class="lv-dot ${li.cls}"></span>
   <div class="sentence-text">${s[nativeLang]}</div>
   <span class="sentence-tag">${s.tag}</span>`;
  item.addEventListener('click',()=>toggleSentence(item,key));
  list.appendChild(item);
 });
}

function toggleSentence(item,key){
 if(selectedIds.has(key)){selectedIds.delete(key);item.classList.remove('selected');}
 else{selectedIds.add(key);item.classList.add('selected');}
 updateBottomBar();updatePreview();
}

function refreshSentences(){
 const btn=document.getElementById('refresh-btn');btn.disabled=true;
 setTimeout(()=>{renderSentences();btn.disabled=false;},350);
}

function updateBottomBar(){
 const el=document.getElementById('count-display');
 if(el)el.textContent=currentStep===3?selectedIds.size:targetLangs.size;
 if(currentStep===3)document.getElementById('next-btn').disabled=selectedIds.size===0;
}

function updatePreview(){
 const preview=document.getElementById('selected-preview');
 document.getElementById('preview-count').textContent=selectedIds.size;
 if(!selectedIds.size){preview.classList.remove('visible');return;}
 preview.classList.add('visible');
 const chips=document.getElementById('preview-chips');chips.innerHTML='';
 selectedIds.forEach(key=>{
  const[cat,idx]=key.split('-');const s=DATA[cat][parseInt(idx)];if(!s)return;
  const chip=document.createElement('div');chip.className='preview-chip';
  chip.innerHTML=`<span>${s[nativeLang]}</span><span class="chip-remove" onclick="removeSelected('${key}')">×</span>`;
  chips.appendChild(chip);
 });
}

function removeSelected(key){
 selectedIds.delete(key);
 document.querySelectorAll('.sentence-item').forEach(item=>{if(item.dataset.key===key)item.classList.remove('selected');});
 updateBottomBar();updatePreview();
}

// ══════════════════════════════════════════════════════════
// STEP 3 → 4
// ══════════════════════════════════════════════════════════
function onNextBtn(){
 if(currentStep===3)goToStep4();
 else if(currentStep===4)startLearning();
}

function goToStep4(){
 stepDone(3);
 document.getElementById('step3').classList.add('hidden');
 document.querySelectorAll('#target-grid .lang-btn').forEach(b=>{
  b.disabled=(b.dataset.lang===nativeLang);
  b.classList.remove('selected');
 });
 targetLangs.clear();renderTargetChips();
 document.getElementById('step4').classList.remove('hidden');
 stepActive(4);currentStep=4;
 document.getElementById('bar-count-area').innerHTML='<span id="count-display">0</span>개 언어 선택됨';
 document.getElementById('next-btn').textContent='학습 시작 →';
 document.getElementById('next-btn').disabled=true;
}

// ══════════════════════════════════════════════════════════
// STEP 4
// ══════════════════════════════════════════════════════════
function toggleTargetLang(btn){
 const lang=btn.dataset.lang;
 if(targetLangs.has(lang)){targetLangs.delete(lang);btn.classList.remove('selected');}
 else{targetLangs.add(lang);btn.classList.add('selected');}
 renderTargetChips();
 document.getElementById('count-display').textContent=targetLangs.size;
 document.getElementById('next-btn').disabled=targetLangs.size===0;
}

function renderTargetChips(){
 const area=document.getElementById('selected-target-langs');area.innerHTML='';
 if(!targetLangs.size){
  area.innerHTML='<span style="font-size:0.8rem;color:var(--text-muted)">언어를 선택하면 여기에 표시됩니다</span>';
  return;
 }
 targetLangs.forEach(lang=>{
  const info=LANG_INFO[lang];
  const chip=document.createElement('div');chip.className='lang-chip';
  chip.innerHTML=`<span>${info.flag}</span><span>${info.name}</span>`;
  area.appendChild(chip);
 });
}

// ══════════════════════════════════════════════════════════
// STEP 5 : CAROUSEL

function startLearning(){
 stepDone(4);
 document.getElementById('step4').classList.add('hidden');
 document.getElementById('bottom-bar').classList.add('hidden');
 buildCarousel();
 document.getElementById('step5').classList.remove('hidden');
 stepActive(5);
}

function buildCarousel(){
 const nl=LANG_INFO[nativeLang];
 const li=LV_INFO[currentLevel];
 const langs=Array.from(targetLangs);

 // Header
 document.getElementById('learn-native-flag').textContent=nl.flag;
 document.getElementById('learn-native-name').textContent=nl.name;
 document.getElementById('learn-target-flags').innerHTML=
  langs.map(l=>`${LANG_INFO[l].flag}<span style="font-size:0.8rem;font-weight:600"> ${LANG_INFO[l].name}</span>`).join(' · ');

 const track=document.getElementById('carousel-track');
 track.innerHTML='';
 const sentences=[];
 selectedIds.forEach(key=>{
  const[cat,idx]=key.split('-');
  const s=DATA[cat][parseInt(idx)];
  if(s)sentences.push({key,cat,idx:parseInt(idx),s});
 });
 cardTotal=sentences.length;cardIndex=0;

 document.getElementById('card-tot').textContent=cardTotal;
 document.getElementById('card-cur').textContent=1;

 sentences.forEach(({key,cat,idx,s})=>{
  const card=document.createElement('div');
  card.className='lc-card';

  // Native text
  const nativeText = nativeLang==='jpn'?(s.jpn_ruby||s.jpn):
                     nativeLang==='cmn'?`<div class="lc-pinyin">${s.cmn_pinyin||''}</div>${s.cmn}`:
                     s[nativeLang];

  let html=`<div class="lc-native">
   <div class="lc-tag-row">
    <span class="lc-tag">${s.tag}</span>
    <span class="lc-lv-dot ${li.cls}" style="background:${li.color}"></span>
    <span style="font-size:0.72rem;color:var(--text-muted)">${li.name}</span>
   </div>
   <div class="lc-native-text">${nativeText}</div>
   <div class="lc-native-lang">${nl.flag} ${nl.name}</div>
  </div>
  <div class="lc-targets">`;

  langs.forEach(lang=>{
   const info=LANG_INFO[lang];
   const rawText=s[lang]||'';
   let displayText='';
   if(lang==='jpn'){
    displayText=s.jpn_ruby||s.jpn;
   } else if(lang==='cmn'){
    displayText=`<div class="lc-pinyin">${s.cmn_pinyin||''}</div>${s.cmn}`;
   } else {
    displayText=rawText;
   }
   const wkey=`${cat}-${idx}`;
   const hasWords=WORDS[wkey]&&WORDS[wkey][lang];
   html+=`<div class="lc-target" data-lang="${lang}" data-text="${rawText.replace(/"/g,'&quot;')}" data-key="${wkey}" onclick="handleTap(this,'${wkey}','${lang}')">
    <div class="lc-target-header">
     <div class="lc-target-label">
      <span>${info.flag}</span>
      <span>${info.name}</span>
      <span class="speak-icon" id="si-${wkey}-${lang}">🔊</span>
     </div>
     <span class="tap-hint">${hasWords?'탭: 듣기 · 두번탭: 해설':'탭: 듣기'}</span>
    </div>
    <div class="lc-target-text">${displayText}</div>
   </div>`;
  });

  html+='</div>';
  card.innerHTML=html;
  track.appendChild(card);
 });

 buildDots(cardTotal);
 updateCarouselNav();
 updateCarouselHeight();

 // Touch swipe
 let tx=0,ty=0;
 const wrap=document.getElementById('carousel-wrap');
 wrap.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;ty=e.changedTouches[0].screenY;},{passive:true});
 wrap.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].screenX-tx;
  const dy=e.changedTouches[0].screenY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>45){
   if(dx>0)prevCard();else nextCard();
  }
 });
}

function buildDots(total){
 const el=document.getElementById('carousel-dots');el.innerHTML='';
 for(let i=0;i<total;i++){
  const d=document.createElement('div');
  d.className='cdot'+(i===0?' active':'');
  d.onclick=(()=>{const idx=i;return()=>goToCard(idx);})();
  el.appendChild(d);
 }
}

function updateDots(){
 document.querySelectorAll('.cdot').forEach((d,i)=>{
  d.classList.toggle('active',i===cardIndex);
 });
}

function goToCard(i){
 cardIndex=i;
 const track=document.getElementById('carousel-track');
 track.style.transform=`translateX(-${cardIndex*100}%)`;
 document.getElementById('card-cur').textContent=cardIndex+1;
 updateDots();updateCarouselNav();
 setTimeout(updateCarouselHeight,50);
}

function prevCard(){if(cardIndex>0)goToCard(cardIndex-1);}
function nextCard(){if(cardIndex<cardTotal-1)goToCard(cardIndex+1);}

function updateCarouselNav(){
 document.getElementById('btn-prev').disabled=cardIndex===0;
 document.getElementById('btn-next-card').disabled=cardIndex===cardTotal-1;
}

function updateCarouselHeight(){
 const cards=document.querySelectorAll('.lc-card');
 if(cards[cardIndex]){
  document.getElementById('carousel-wrap').style.height=cards[cardIndex].offsetHeight+'px';
 }
}

// ══════════════════════════════════════════════════════════
// TTS
// ══════════════════════════════════════════════════════════
function speakText(text,lang){
 if(!window.speechSynthesis||!text)return;
 speechSynthesis.cancel();
 const u=new SpeechSynthesisUtterance(text);
 u.lang=LANG_INFO[lang].tts;
 u.rate=0.9;
 speechSynthesis.speak(u);
}

// ══════════════════════════════════════════════════════════
// TAP : 1회=TTS, 2회=해설
// ══════════════════════════════════════════════════════════
function handleTap(el,key,lang){
 if(tapTimer&&tapEl===el){
  // Double tap → breakdown
  clearTimeout(tapTimer);tapTimer=null;tapEl=null;
  showBreakdown(key,lang,el);
 } else {
  tapEl=el;
  // Single tap → TTS
  const rawText=el.dataset.text;
  speakText(rawText,lang);
  // Visual feedback
  el.classList.add('playing');
  const icon=document.getElementById('si-'+key+'-'+lang);
  if(icon)icon.style.opacity='1';
  setTimeout(()=>{
   el.classList.remove('playing');
   if(icon)icon.style.opacity='';
  },2000);
  tapTimer=setTimeout(()=>{tapTimer=null;tapEl=null;},420);
 }
}

// ══════════════════════════════════════════════════════════
// BREAKDOWN MODAL
// ══════════════════════════════════════════════════════════
function showBreakdown(key,lang,el){
 const wdata=WORDS[key];
 const info=LANG_INFO[lang];
 const[cat,idx]=key.split('-');
 const s=DATA[cat]?.[parseInt(idx)];
 if(!s)return;

 document.getElementById('modal-flag').textContent=info.flag;
 document.getElementById('modal-lang-name').textContent=info.name;

 // Original text with furigana/pinyin
 let origDisplay='';
 if(lang==='jpn')origDisplay=s.jpn_ruby||s.jpn;
 else if(lang==='cmn')origDisplay=`${s.cmn} (${s.cmn_pinyin||''})`;
 else origDisplay=s[lang]||'';
 document.getElementById('modal-original').innerHTML=origDisplay;

 const wordsEl=document.getElementById('modal-words');
 wordsEl.innerHTML='';

 if(wdata&&wdata[lang]&&wdata[lang].length){
  wdata[lang].forEach(w=>{
   const row=document.createElement('div');row.className='word-row';
   let reading='';
   if(w.r)reading=`<div class="word-reading">읽기: ${w.r}</div>`;
   else if(w.p)reading=`<div class="word-reading">병음: ${w.p}</div>`;
   row.innerHTML=`<div class="word-left"><div class="word-text">${w.t}</div>${reading}</div>
    <div class="word-meaning">${w.m}</div>`;
   wordsEl.appendChild(row);
  });
 } else {
  wordsEl.innerHTML='<div style="color:var(--text-muted);font-size:0.85rem;text-align:center;padding:16px">해설 준비 중입니다.</div>';
 }

 // Tip
 const tips={
  jpn:'💡 한자 위의 작은 글자(후리가나)가 읽는 방법입니다. 탭 1회로 음성을 들을 수 있어요.',
  cmn:'💡 한자 옆/위의 로마자(병음)로 발음을 표기합니다. 성조(ˉ ˊ ˇ ˋ)에 주의하세요.',
  jpn_note:'',
 };
 document.getElementById('modal-tip').textContent=tips[lang]||'💡 탭 1회: 음성 재생 · 탭 2회: 이 해설 화면';

 document.getElementById('breakdown-modal').classList.remove('hidden');
}

function closeBreakdown(){
 document.getElementById('breakdown-modal').classList.add('hidden');
}

// 키보드 좌우 화살표
document.addEventListener('keydown',e=>{
 if(e.key==='ArrowLeft')prevCard();
 else if(e.key==='ArrowRight')nextCard();
 else if(e.key==='Escape')closeBreakdown();
});
</script>
</body>
</html>
