<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3349;
      --accent: #5b6ef5;
      --accent-hover: #7080ff;
      --text: #e8eaf6;
      --text-muted: #7b82a8;
      --success: #4caf8a;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* ── STEP INDICATOR ── */
    .steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 40px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .step.active { color: var(--accent); }
    .step.done { color: var(--success); }
    .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700;
      flex-shrink: 0;
    }
    .step.done .step-num {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .step.active .step-num {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .step-line {
      width: 40px; height: 2px;
      background: var(--border);
      margin: 0 4px;
    }
    .step-line.done { background: var(--success); }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 700px;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 24px;
    }

    /* ── LANGUAGE GRID ── */
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    @media (max-width: 520px) {
      .lang-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .lang-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      color: var(--text);
    }
    .lang-btn:hover {
      border-color: var(--accent);
      background: #1f2340;
    }
    .lang-btn.selected {
      border-color: var(--accent);
      background: rgba(91,110,245,0.15);
    }
    .lang-btn .flag { font-size: 2rem; }
    .lang-btn .name { font-size: 0.8rem; font-weight: 600; }
    .lang-btn .native { font-size: 0.7rem; color: var(--text-muted); }

    /* ── SENTENCES ── */
    .sentence-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .badge {
      background: rgba(91,110,245,0.2);
      color: var(--accent);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .btn-refresh {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.82rem;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
    .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }

    .sentence-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sentence-item {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.18s;
      user-select: none;
    }
    .sentence-item:hover { border-color: var(--accent); }
    .sentence-item.selected {
      border-color: var(--accent);
      background: rgba(91,110,245,0.12);
    }

    .checkbox {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .sentence-item.selected .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }
    .checkbox-mark {
      color: #fff;
      font-size: 0.75rem;
      display: none;
    }
    .sentence-item.selected .checkbox-mark { display: block; }

    .sentence-text {
      font-size: 1rem;
      line-height: 1.5;
      flex: 1;
    }
    .sentence-tag {
      font-size: 0.72rem;
      color: var(--text-muted);
      background: var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      flex-shrink: 0;
    }

    /* loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px;
      height: 56px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(15,17,23,0.95);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(10px);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .selected-count {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .selected-count span {
      color: var(--accent);
      font-weight: 700;
    }
    .btn-next {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-next:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-next:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    /* ── SELECTED PREVIEW ── */
    .selected-preview {
      margin-top: 20px;
      display: none;
    }
    .selected-preview.visible { display: block; }
    .preview-title {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .preview-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .preview-chip {
      background: rgba(91,110,245,0.15);
      border: 1px solid rgba(91,110,245,0.3);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.82rem;
      display: flex; align-items: center; gap: 6px;
    }
    .chip-remove {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1;
    }
    .chip-remove:hover { color: #ff6b6b; }

    /* fade-in */
    .fade-in {
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* hidden */
    .hidden { display: none !important; }
  </style>
</head>

</div>

<!-- STEP 1: 모국어 선택 -->

  <div class="lang-grid">
    <button class="lang-btn" data-lang="kor" onclick="selectNativeLang(this)">
      <span class="flag">🇰🇷</span>
      <span class="name">Korean</span>
      <span class="native">한국어</span>
    </button>
    <button class="lang-btn" data-lang="eng" onclick="selectNativeLang(this)">
      <span class="flag">🇺🇸</span>
      <span class="name">English</span>
      <span class="native">영어</span>
    </button>
    <button class="lang-btn" data-lang="jpn" onclick="selectNativeLang(this)">
      <span class="flag">🇯🇵</span>
      <span class="name">Japanese</span>
      <span class="native">日本語</span>
    </button>
    <button class="lang-btn" data-lang="cmn" onclick="selectNativeLang(this)">
      <span class="flag">🇨🇳</span>
      <span class="name">Chinese</span>
      <span class="native">中文</span>
    </button>
    <button class="lang-btn" data-lang="vie" onclick="selectNativeLang(this)">
      <span class="flag">🇻🇳</span>
      <span class="name">Vietnamese</span>
      <span class="native">Tiếng Việt</span>
    </button>
  </div>
</div>

<!-- STEP 2: 문장 선택 -->
<div class="card fade-in hidden" id="step2">
  <div class="sentence-controls">
    <div>
      <div class="card-title" style="margin-bottom:4px" id="step2-title">문장을 선택하세요</div>

    </div>
    <div style="display:flex; gap:8px; align-items:center">
      <span class="badge" id="category-badge">일상</span>
      <button class="btn-refresh" id="refresh-btn" onclick="refreshSentences()">
        <span id="refresh-icon">↻</span> 새로고침
      </button>
    </div>
  </div>

  <!-- Category Tabs -->
  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px" id="category-tabs">
    <button class="cat-tab active" data-cat="daily" onclick="switchCategory(this,'daily')">일상 대화</button>
    <button class="cat-tab" data-cat="greeting" onclick="switchCategory(this,'greeting')">인사/반응</button>
    <button class="cat-tab" data-cat="feeling" onclick="switchCategory(this,'feeling')">감정/상태</button>
    <button class="cat-tab" data-cat="question" onclick="switchCategory(this,'question')">질문</button>
  </div>

  <div class="sentence-list" id="sentence-list"></div>

  <!-- Selected preview -->
  <div class="selected-preview" id="selected-preview">
    <div class="preview-title">선택한 문장 (<span id="preview-count">0</span>개)</div>
    <div class="preview-chips" id="preview-chips"></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar hidden" id="bottom-bar">
  <div class="selected-count"><span id="count-display">0</span>개 선택됨</div>
  <button class="btn-next" id="next-btn" disabled onclick="goNext()">
    다음 단계 →

</div>

// ── STATE ──────────────────────────────────────────────
let nativeLang = null;
let currentCategory = 'daily';
let selectedSentences = new Set();

// ── FUNCTIONS ──────────────────────────────────────────

function selectNativeLang(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  nativeLang = btn.dataset.lang;

  const langNames = { kor: '한국어', eng: 'English', jpn: '日本語', cmn: '中文', vie: 'Tiếng Việt' };

  setTimeout(() => {
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    document.getElementById('bottom-bar').classList.remove('hidden');
    document.getElementById('step2-title').textContent = `${langNames[nativeLang]} 문장을 선택하세요`;

    // update step indicator
    document.getElementById('step1-indicator').classList.remove('active');
    document.getElementById('step1-indicator').classList.add('done');
    document.getElementById('step1-indicator').querySelector('.step-num').textContent = '✓';
    document.getElementById('line1').classList.add('done');
    document.getElementById('step2-indicator').classList.add('active');

    renderSentences();
  }, 200);
}

function switchCategory(btn, cat) {
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = cat;

  const catNames = { daily: '일상', greeting: '인사/반응', feeling: '감정', question: '질문' };
  document.getElementById('category-badge').textContent = catNames[cat];
  renderSentences();
}

function renderSentences() {
  const list = document.getElementById('sentence-list');
  const sentences = SENTENCES[nativeLang][currentCategory];

  // shuffle
  const shuffled = [...sentences].sort(() => Math.random() - 0.5).slice(0, 8);

  list.innerHTML = '';
  shuffled.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'sentence-item fade-in' + (selectedSentences.has(s.text) ? ' selected' : '');
    item.style.animationDelay = `${i * 0.04}s`;
    item.dataset.text = s.text;
    item.innerHTML = `
      <div class="checkbox"><span class="checkbox-mark">✓</span></div>
      <div class="sentence-text">${s.text}</div>
      <span class="sentence-tag">${s.tag}</span>
    `;
    item.addEventListener('click', () => toggleSentence(item, s.text));
    list.appendChild(item);
  });
}

function toggleSentence(item, text) {
  if (selectedSentences.has(text)) {
    selectedSentences.delete(text);
    item.classList.remove('selected');
  } else {
    selectedSentences.add(text);
    item.classList.add('selected');
  }
  updateBottomBar();
  updatePreview();
}

function refreshSentences() {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.style.display = 'inline-block';
  icon.style.animation = 'spin 0.5s linear';

  setTimeout(() => {
    renderSentences();
    btn.disabled = false;
    icon.style.animation = '';
  }, 400);
}

function updateBottomBar() {
  const count = selectedSentences.size;
  document.getElementById('count-display').textContent = count;
  document.getElementById('next-btn').disabled = count === 0;
}

function updatePreview() {
  const preview = document.getElementById('selected-preview');
  const chips = document.getElementById('preview-chips');
  const countEl = document.getElementById('preview-count');

  if (selectedSentences.size === 0) {
    preview.classList.remove('visible');
    return;
  }

  preview.classList.add('visible');
  countEl.textContent = selectedSentences.size;
  chips.innerHTML = '';

  selectedSentences.forEach(text => {
    const chip = document.createElement('div');
    chip.className = 'preview-chip';
    chip.innerHTML = `
      <span>${text}</span>
      <span class="chip-remove" onclick="removeSelected('${text.replace(/'/g, "\\'")}')">×</span>
    `;
    chips.appendChild(chip);
  });
}

function removeSelected(text) {
  selectedSentences.delete(text);
  document.querySelectorAll('.sentence-item').forEach(item => {
    if (item.dataset.text === text) item.classList.remove('selected');
  });
  updateBottomBar();
  updatePreview();
}

function goNext() {
  alert(`${selectedSentences.size}개 문장 선택 완료!\n\n다음 단계: 학습할 언어를 선택하고 연습을 시작합니다.\n\n(다음 단계 개발 예정)`);
}

// spin animation
const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);
</script>
